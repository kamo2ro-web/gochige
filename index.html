<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>Gochi-Game Touch Deluxe</title>

<style>
body{
background:#fff;
color:#222;
text-align:center;
font-family:sans-serif;
}

canvas{
border:1px solid #888;
width:min(92vw,600px);
height:auto;
touch-action:manipulation;
margin-top:10px;
}

#ui{
font-size:22px;
margin:10px;
}

button{
padding:8px 16px;
font-size:18px;
}

#message{
height:35px;
font-size:24px;
color:#cc8800;
}
</style>
</head>
<body>

<h1>SameGame</h1>

<div id="ui">
Score:
<span id="score">0</span>
　
Hi:
<span id="hiscore">0</span>
</div>

<div id="message"></div>

<canvas id="game" width="300" height="300"></canvas>

<br>
<button onclick="startGame()">
NEW GAME
</button>

<script>

const SIZE=10;
const COLORS=4;
const CELL=30;

const canvas=
document.getElementById("game");
const ctx=
canvas.getContext("2d");

let grid=[];

let score=0;
let gameOver=false;

let popups=[];
let particles=[];

let selectedGroup=null;

let touchStartX=0;
let touchStartY=0;
let moved=false;

const bg=new Image();
bg.src="background.png";

const images=[];
for(let i=0;i<COLORS;i++){
 let img=new Image();
 img.src="block"+i+".png";
 images.push(img);
}

const sound=
new Audio("pop.wav");


let hiscore=
localStorage.getItem(
"same_hi"
)||0;

document.getElementById(
"hiscore"
).textContent=hiscore;



function startGame(){

score=0;
gameOver=false;
selectedGroup=null;

document.getElementById(
"score"
).textContent=0;

document.getElementById(
"message"
).textContent="";

grid=[];

for(let y=0;y<SIZE;y++){

 let row=[];

 for(let x=0;x<SIZE;x++){

 row.push(
 Math.floor(
 Math.random()*COLORS
 )
 );

 }

 grid.push(row);

}

}



function draw(){

ctx.clearRect(
0,0,300,300
);

ctx.drawImage(
bg,
0,0,
300,300
);



for(let y=0;y<SIZE;y++){
for(let x=0;x<SIZE;x++){

let v=grid[y][x];
if(v===null) continue;

let px=x*CELL;
let py=y*CELL;

let selected=
selectedGroup &&
selectedGroup.some(
g=>
g[0]==x &&
g[1]==y
);

/* 選択中グループ浮く */
if(selected){
px-=2;
py-=2;

ctx.drawImage(
images[v],
px,
py,
CELL+4,
CELL+4
);

continue;
}

ctx.drawImage(
images[v],
px,
py,
CELL,
CELL
);

}
}


/* 選択枠 */
if(selectedGroup){

ctx.strokeStyle="gold";
ctx.lineWidth=3;

for(let g of selectedGroup){

ctx.strokeRect(
g[0]*CELL+2,
g[1]*CELL+2,
CELL-4,
CELL-4
);

}

}



/* 消去アニメ */
for(
let i=particles.length-1;
i>=0;
i--
){

let p=particles[i];

ctx.globalAlpha=
p.life/30;

ctx.drawImage(
images[p.color],
p.x,
p.y,
CELL*(p.life/30),
CELL*(p.life/30)
);

ctx.globalAlpha=1;

p.life--;

p.x+=p.vx;
p.y+=p.vy;

if(
p.life<=0
)
particles.splice(i,1);

}



/* 得点ポップアップ */
for(
let i=popups.length-1;
i>=0;
i--
){

let p=popups[i];

ctx.fillStyle="black";
ctx.font="16px sans-serif";

ctx.fillText(
"+"+p.text,
p.x,
p.y
);

p.y-=1;
p.life--;

if(
p.life<=0
)
popups.splice(i,1);

}

requestAnimationFrame(draw);

}



function popup(t,x,y){

popups.push({
text:t,
x:x,
y:y,
life:45
});

}



function explode(group,color){

for(let g of group){

particles.push({

x:g[0]*CELL,
y:g[1]*CELL,

vx:
(Math.random()-0.5)*2,

vy:
(Math.random()-0.5)*2,

life:30,

color:color

});

}

}



function updateScore(p){

score+=p;

document.getElementById(
"score"
).textContent=score;


if(score>hiscore){

hiscore=score;

localStorage.setItem(
"same_hi",
hiscore
);

document.getElementById(
"hiscore"
).textContent=hiscore;

}

}



function floodFill(
x,y,color,visited
){

if(
x<0||y<0||
x>=SIZE||y>=SIZE
)return[];

if(
visited[y][x]
)return[];

if(
grid[y][x]!==color
)return[];


visited[y][x]=true;

let r=[[x,y]];

r=r.concat(
floodFill(
x+1,y,color,visited
)
);

r=r.concat(
floodFill(
x-1,y,color,visited
)
);

r=r.concat(
floodFill(
x,y+1,color,visited
)
);

r=r.concat(
floodFill(
x,y-1,color,visited
)
);

return r;

}



function sameGroup(a,b){

if(!a||!b)
return false;

if(
a.length!==b.length
)
return false;

for(
let i=0;
i<a.length;
i++
){
if(
a[i][0]!==b[i][0]||
a[i][1]!==b[i][1]
)
return false;
}

return true;

}



function drop(){

for(let x=0;x<SIZE;x++){

let s=[];

for(
let y=SIZE-1;
y>=0;
y--
){
if(
grid[y][x]!==null
)
s.push(
grid[y][x]
);
}

for(
let y=SIZE-1;
y>=0;
y--
){
grid[y][x]=
s.shift()??null;
}

}

}



function shiftLeft(){

let cols=[];

for(
let x=0;
x<SIZE;
x++
){

let c=[];

for(
let y=0;
y<SIZE;
y++
){
c.push(
grid[y][x]
);
}

if(
c.some(
v=>v!==null
)
)
cols.push(c);

}

while(
cols.length<SIZE
)
cols.push(
Array(SIZE)
.fill(null)
);


for(
let x=0;x<SIZE;x++
){
for(
let y=0;y<SIZE;y++
){
grid[y][x]=
cols[x][y];
}
}

}



function hasMoves(){

for(
let y=0;y<SIZE;y++
){
for(
let x=0;x<SIZE;x++
){

let v=grid[y][x];

if(v===null)
continue;

if(
x<SIZE-1 &&
grid[y][x+1]===v
)return true;

if(
y<SIZE-1 &&
grid[y+1][x]===v
)return true;

}
}

return false;

}



function allClear(){

return grid.flat()
.every(
v=>v===null
);

}



function endGame(){

gameOver=true;

document.getElementById(
"message"
).textContent=
"GAME OVER";

setTimeout(
startGame,
1800
);

}



function handleTap(e){

if(moved) return;
if(gameOver) return;


let r=
canvas.getBoundingClientRect();

let scaleX=
canvas.width/r.width;

let scaleY=
canvas.height/r.height;


let x=Math.floor(
((e.clientX-r.left)
*scaleX)
/CELL
);

let y=Math.floor(
((e.clientY-r.top)
*scaleY)
/CELL
);

if(
grid[y][x]===null
)return;



let visited=
Array.from(
{length:SIZE},
()=>Array(SIZE)
.fill(false)
);


let group=
floodFill(
x,y,
grid[y][x],
visited
);

if(
group.length<2
){
selectedGroup=null;
return;
}



/* 一回目選択 */
if(
!sameGroup(
selectedGroup,
group
)
){

selectedGroup=group;
return;
}


/* 二回目で消す */
selectedGroup=null;


let points=
(group.length-2)**2;

updateScore(
points
);

popup(
points,
x*CELL+10,
y*CELL+20
);

explode(
group,
grid[y][x]
);

sound.currentTime=0;
sound.play();

group.forEach(
([gx,gy])=>
grid[gy][gx]=null
);

drop();
shiftLeft();


if(
allClear()
){

updateScore(1000);

document.getElementById(
"message"
).textContent=
"ALL CLEAR +1000";

setTimeout(
startGame,
2500
);

return;

}


if(
!hasMoves()
)
endGame();

}



canvas.addEventListener(
"pointerdown",
e=>{
touchStartX=e.clientX;
touchStartY=e.clientY;
moved=false;
}
);


canvas.addEventListener(
"pointermove",
e=>{

if(
Math.abs(
e.clientX-touchStartX
)>10 ||

Math.abs(
e.clientY-touchStartY
)>10
){
moved=true;
}

}
);


canvas.addEventListener(
"pointerup",
handleTap
);


bg.onload=()=>{
startGame();
draw();
};

</script>
</body>
</html>
